version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps to keep PR noise down; majors come separately.
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
