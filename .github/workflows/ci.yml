name: CI

# Quality gates per §12 of the project brief. Runs on every PR + pushes to main.
# Build-failing where we are confident; perf/a11y score gates start as warnings
# and are ratcheted to errors once the Batch-2 fixes land (see lighthouserc.json).

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build must succeed without real secrets; code falls back to demo/no-op
          # paths when these are absent (verified in lib/db.ts, lib/razorpay.ts).
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    name: Donation E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build-and-check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      # Build-failing critical-path gate (§12). Playwright's webServer builds +
      # starts the prod server; Razorpay + /api/donate are mocked in-test.
      - name: Run donation E2E
        run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Lighthouse CI (perf, a11y, SEO, budgets)
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun || echo "LHCI assertions reported (non-blocking while ratcheting)"
